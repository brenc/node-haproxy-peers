version: "3.9"
services:
  proxy:
    build:
      args:
        - USER
      context: ./test-proxy
    hostname: test-proxy
    init: true
    ports:
      # Non-ssl port
      - 8100:8100
      - 8101:8101
      - 8102:8102
      - 8103:8103
    volumes:
      - ${PWD}/../haproxy-2.5.0/haproxy:/usr/local/sbin/haproxy
      - ${PWD}/test-proxy/etc:/usr/local/etc/haproxy
      - ${PWD}/test-proxy/package.json:/app/package.json
      - ${PWD}/test-proxy/bun.lock:/app/bun.lock

  demo:
    build:
      args:
        - NODE_ENV
        - UID
        - USER
      context: .
      target: development
    environment:
      DEBUG: haproxy-peers:*
    init: true
    #ports:
    #  - 8200:8200
    volumes:
      - ${PWD}/src:/app/src
      - ${PWD}/package.json:/app/package.json
      - ${PWD}/bun.lock:/app/bun.lock

  test_watch:
    build:
      args:
        - UID
        - USER
      context: .
      target: test_watch
    volumes:
      - ${PWD}:/app

  tsc_watch:
    build:
      args:
        - UID
        - USER
      context: .
      target: tsc_watch
    init: true
    volumes:
      - ${PWD}:/app

